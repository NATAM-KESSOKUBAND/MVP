# worst_actions_map.yaml
# 논란 유형별/단계별 절대 금기 사항 (Worst Actions)

controversy_rules:
  hate_speech: # 혐오 표현/망언
    early:
      - "감정적으로 즉각 반박하는 영상 업로드"
      - "비판 댓글 실시간 삭제 및 차단"
      - "피해자 조롱 또는 기싸움"
    community:
      - "표현의 자유를 주장하며 정당화"
      - "커뮤니티 내 여론 조작 시도"
    media:
      - "언론 대상 법적 대응 협박"
      - "적반하장식 공식 입장문 발표"
      - "다른 사람이 시켰다는 등 책임 회피 발언"

  advertising_issue: # 뒷광고/기만 광고
    early:
      - "해당 영상 즉시 비공개 처리/증거 인멸"
      - "내돈내산이라며 거짓말"
    community:
      - "편집자/직원에게 책임 전가"
      - "기존 영상들의 광고 표기를 몰래 수정"
    media:
      - "해당 논란에 대해 침묵 유지 및 활동 강행"
      - "협찬사와의 계약 책임 회피 발언"

  attitude_issue: # 인성/태도 논란
    early:
      - "시청자 가스라이팅"
      - "실시간 스트리밍으로 억울함 호소"
    community:
      - "지인/팬을 동원한 미담/여론 조작"
      - "비판적인 팬들 블랙리스트 등록"

  illegal_issue: # 범죄/법규 위반
    early:
      - "급발진식 실시간 스트리밍으로 감정적 사과"
      - "사실 무근이라며 허위 반박"
    permanent:
      - "6개월 수익 창출 정지 전 조기 복귀"
      - "반성한다면서 호화 생활 SNS 인증"
      - "피해자와 합의 전 또는 상황 해결 전에 복귀 선언"

  privacy_issue: # 사생활 논란
    early:
      - "상대방에 대한 폭로성 맞대응"
      - "기억이 안 난다는 식의 회피"
    community:
      - "팬들에게 동정심 유발"
    media:
      - "사과문에 광고/후원 창 열어두기"
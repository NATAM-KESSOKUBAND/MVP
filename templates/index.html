<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크리에이터 위기 분석</title>
<style>
  :root {
    --bg: #0f1115; --card: #1a1d24; --line: #2a2e38;
    --text: #e6e8ec; --muted: #9aa0ac; --accent: #5b8cff;
    --safe:#3fb950; --care:#d29922; --alert:#e3873c; --danger:#f0883e; --critical:#f85149;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Segoe UI", "Malgun Gothic", sans-serif; line-height: 1.6;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 18px; }
  textarea {
    width: 100%; min-height: 70px; resize: vertical; background: #11141a;
    border: 1px solid var(--line); border-radius: 8px; color: var(--text);
    padding: 12px; font-size: 15px; font-family: inherit;
  }
  .row { display: flex; gap: 10px; margin-top: 12px; align-items: center; }
  button {
    background: var(--accent); color: #fff; border: 0; border-radius: 8px;
    padding: 11px 20px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .hint { color: var(--muted); font-size: 13px; }
  .hidden { display: none; }
  .status { display: flex; align-items: center; gap: 10px; font-size: 15px; }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--line);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ttl { font-size: 18px; font-weight: 700; margin: 2px 0 6px; }
  .meta-line { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .sec-h { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 18px 0 8px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 13px; font-weight: 600; }
  .pill { background:#11141a; border:1px solid var(--line); border-radius:8px; padding:8px 12px; font-size:14px; margin:4px 6px 4px 0; display:inline-block; }
  .lvl-SAFE{background:rgba(63,185,80,.15);color:var(--safe)}
  .lvl-CARE{background:rgba(210,153,34,.15);color:var(--care)}
  .lvl-ALERT{background:rgba(227,135,60,.15);color:var(--alert)}
  .lvl-DANGER{background:rgba(240,136,62,.18);color:var(--danger)}
  .lvl-CRITICAL{background:rgba(248,81,73,.18);color:var(--critical)}
  ul { margin: 6px 0; padding-left: 18px; }
  li { margin: 3px 0; }
  .dl { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
  .dl a { text-decoration:none; }
  .dl button { background:#262b36; }
  .err { color: var(--critical); }
  .kv { color: var(--muted); font-size: 13px; }
  pre.summary { white-space: pre-wrap; background:#11141a; border:1px solid var(--line); border-radius:8px; padding:12px; font-size:14px; font-family:inherit; margin:6px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎬 크리에이터 위기 분석</h1>
  <div class="sub">유튜브·구글드라이브 URL, 로컬 영상 경로, 또는 텍스트를 입력하세요.</div>

  <div class="card">
    <textarea id="input" placeholder="예) https://www.youtube.com/watch?v=...  또는  분석할 문장"></textarea>
    <div class="row">
      <button id="go" onclick="analyze()">분석 시작</button>
      <span class="hint">영상은 길이에 따라 수 분 걸릴 수 있어요.</span>
    </div>
  </div>

  <div id="statusCard" class="card hidden">
    <div class="status">
      <div class="spinner" id="spin"></div>
      <span id="statusText">대기 중...</span>
    </div>
  </div>

  <div id="result" class="card hidden"></div>
</div>

<script>
const LEVELS = ["SAFE","CARE","ALERT","DANGER","CRITICAL"];
let pollTimer = null;

async function analyze() {
  const input = document.getElementById("input").value.trim();
  if (!input) { alert("입력값을 넣어주세요."); return; }

  const goBtn = document.getElementById("go");
  goBtn.disabled = true;
  document.getElementById("result").classList.add("hidden");
  showStatus(true, "분석 요청 중...");

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input })
    });
    const data = await res.json();
    if (data.error) { fail(data.error); return; }
    poll(data.job_id);
  } catch (e) {
    fail("요청 실패: " + e.message);
  }
}

function poll(jobId) {
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch("/status/" + jobId);
      const job = await res.json();
      if (job.status === "queued")   showStatus(true, "대기열에 있습니다...");
      if (job.status === "running")  showStatus(true, "분석 중입니다... (전사·교정·판정)");
      if (job.status === "error") { fail(job.error || "분석 중 오류"); clearInterval(pollTimer); }
      if (job.status === "done")  { clearInterval(pollTimer); render(job, jobId); }
    } catch (e) {
      fail("상태 조회 실패: " + e.message); clearInterval(pollTimer);
    }
  }, 2000);
}

function showStatus(show, text) {
  const c = document.getElementById("statusCard");
  c.classList.toggle("hidden", !show);
  if (text) document.getElementById("statusText").textContent = text;
  document.getElementById("spin").style.display = show ? "block" : "none";
}

function fail(msg) {
  showStatus(false);
  document.getElementById("go").disabled = false;
  const r = document.getElementById("result");
  r.classList.remove("hidden");
  r.innerHTML = '<div class="err">⚠️ ' + escapeHtml(msg) + '</div>';
}

function render(job, jobId) {
  showStatus(false);
  document.getElementById("go").disabled = false;
  const rep = job.report || {};
  const meta = rep.meta || {};
  let h = "";

  // 제목 / 개요
  h += '<div class="ttl">' + escapeHtml(meta.incident_title || "분석 결과") + '</div>';
  const metaBits = [];
  if (meta.video_filename) metaBits.push(escapeHtml(meta.video_filename));
  if (meta.duration_sec)   metaBits.push(meta.duration_sec + "초 영상");
  if (meta.elapsed_sec)    metaBits.push("분석 " + meta.elapsed_sec + "초");
  if (meta.transcribe_engine) metaBits.push("전사: " + meta.transcribe_engine);
  if (metaBits.length) h += '<div class="meta-line">' + metaBits.join("  ·  ") + '</div>';
  if (meta.incident_summary) h += '<pre class="summary">' + escapeHtml(meta.incident_summary) + '</pre>';
  if (meta.input_query && !meta.incident_title) h += '<pre class="summary">' + escapeHtml(meta.input_query) + '</pre>';

  // NATAM 위험도
  const natam = rep.natam_risk;
  if (natam && (natam.overall_a || natam.overall_b)) {
    h += '<div class="sec-h">NATAM 위험도</div>';
    h += lvlBadge("커뮤니티(A축)", natam.overall_a);
    h += lvlBadge("플랫폼(B축)", natam.overall_b);
  }

  // 분류
  const cls = rep.classification;
  if (cls && (cls.primary || (cls.labels && cls.labels.length))) {
    h += '<div class="sec-h">콘텐츠 분류</div>';
    const labels = cls.labels && cls.labels.length ? cls.labels : [cls.primary];
    h += labels.map(l => '<span class="pill">' + escapeHtml(l) + '</span>').join("");
  }

  // 2-Tier 결과 (1.9.2)
  const tt = rep.two_tier;
  if (tt && typeof tt.triggered_count !== "undefined") {
    h += '<div class="sec-h">2-Tier 판정</div>';
    h += '<div class="pill">의심 트리거 ' + tt.triggered_count + '건</div>';
    h += '<div class="pill">확정 논란 ' + ((tt.confirmed||[]).length) + '건</div>';
    if ((tt.confirmed||[]).length) {
      h += '<ul>' + tt.confirmed.slice(0,5).map(c =>
        '<li>' +
        (c.timestamp && c.timestamp !== "—" ? '<b>[' + escapeHtml(c.timestamp) + ']</b> ' : '') +
        escapeHtml(c.quote || c.rationale || "") +
        ' <span class="kv">(' + escapeHtml(c.category||"") + " / " + escapeHtml(c.severity||"") + ')</span></li>'
      ).join("") + '</ul>';
    }
  }

  // 검증 필요 주장 (L04 Stage1 — 진위 판정 아님)
  const cc = rep.claim_check;
  if (cc && cc.claims && cc.claims.length) {
    const cwMark = { HIGH: "🔴", MEDIUM: "🟡", LOW: "🟢" };
    h += '<div class="sec-h">검증 필요 주장 (사실확인 Stage 1)</div>';
    h += '<div class="kv">⚠️ \'검증이 필요한 주장\'이며 거짓으로 단정한 것이 아닙니다.</div>';
    h += '<ul>' + cc.claims.slice(0, 8).map(c =>
      '<li>' +
      (cwMark[c.checkworthiness] || '⚪') + ' ' +
      (c.timestamp && c.timestamp !== "—" ? '<b>[' + escapeHtml(c.timestamp) + ']</b> ' : '') +
      escapeHtml(c.claim || "") +
      ' <span class="kv">(' + escapeHtml(c.domain || "기타") + ')</span>' +
      (c.reason ? '<br><span class="kv">→ ' + escapeHtml(c.reason) + '</span>' : '') +
      '</li>'
    ).join("") + '</ul>';
  }

  // 룰 스캔
  const rs = rep.rule_scan;
  if (rs && rs.hit) {
    h += '<div class="sec-h">룰 매칭</div>';
    const matches = rs.all_matches || [rs];
    h += '<ul>' + matches.slice(0,8).map(m =>
      '<li><b>' + escapeHtml(m.matched_word||"") + '</b> <span class="kv">(' +
      escapeHtml(m.policy||"") + " / " + escapeHtml(m.severity||"") + ')</span></li>'
    ).join("") + '</ul>';
  }

  // 유사 사례
  const sims = rep.similar_cases;
  if (sims && sims.length) {
    h += '<div class="sec-h">유사 과거 사례</div>';
    h += '<ul>' + sims.map(c => '<li>' + escapeHtml(c.title||"") +
      (c.controversy_type ? ' <span class="kv">(' + escapeHtml(c.controversy_type) + ')</span>' : "") +
      '</li>').join("") + '</ul>';
  }

  // 비용 (1.9.2)
  if (meta.cost && meta.cost.llm_calls) {
    h += '<div class="sec-h">분석 비용</div>';
    h += '<div class="kv">LLM 호출 ' + meta.cost.llm_calls + '회 · 토큰 ' +
         (meta.cost.in_tokens + meta.cost.out_tokens).toLocaleString() +
         ' · 약 $' + meta.cost.est_usd + '</div>';
  }

  // 다운로드 버튼
  let dl = "";
  if (job.md_path)  dl += '<a href="/download/' + jobId + '/md"><button>📄 MD 다운로드</button></a>';
  if (job.pdf_path) dl += '<a href="/download/' + jobId + '/pdf"><button>📑 PDF 다운로드</button></a>';
  if (dl) h += '<div class="dl">' + dl + '</div>';

  const r = document.getElementById("result");
  r.classList.remove("hidden");
  r.innerHTML = h;
}

function lvlBadge(label, level) {
  if (!level) return "";
  return '<span class="pill">' + escapeHtml(label) +
         ' <span class="badge lvl-' + escapeHtml(level) + '">' + escapeHtml(level) + '</span></span>';
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Ctrl+Enter 로 제출
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyze();
});
</script>
</body>
</html>

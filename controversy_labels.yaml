version: "1.1"
project: "Incident Analysis MVP"
default_allow_overlap: true

labels:
  - id: "L01"
    name: "직접적 욕설"
    description: "비속어, 욕설 및 필터링 회피를 위한 변칙 표기"
  - id: "L02"
    name: "인신공격/비하"
    description: "개인의 외모, 지능, 인격에 대한 조롱 및 폄하"
  - id: "L03"
    name: "혐오 표현"
    description: "특정 집단(인종, 지역, 성별 등) 대상 멸칭 및 차별"
  - id: "L04"
    name: "허위 정보"
    description: "사실 왜곡, 음모론 유포 및 사회적 혼란 야기"
  - id: "L06"
    name: "위험/자해 행동"
    description: "생명 위협 행위 및 모방 위험이 큰 챌린지"
  - id: "L07"
    name: "정치적 편향"
    description: "갈등 조장 목적의 극단적 선동 및 맹목적 비난"
  - id: "L08"
    name: "사생활 침해"
    description: "동의 없는 개인정보 및 사적 대화 노출"
  - id: "L09"
    name: "성적 불쾌감"
    description: "성희롱, 선정적 자막 및 부적절한 신체 강조"
  - id: "L11"
    name: "피해자 조롱"
    description: "사건 사고 피해자에 대한 2차 가해 및 비난"
  - id: "L12"
    name: "해당 없음"
    description: "리스크 요인이 발견되지 않은 깨끗한 상태"
    allow_overlap: false # '해당 없음'은 다른 라벨과 겹칠 수 없음